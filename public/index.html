<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Counter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-slate-200 to-blue-300">
    <div class="bg-gray-50 shadow-xl rounded-2xl p-8 text-center w-80 hover:ring-2 hover:ring-blue-600 transition-all duration-300">
         <div class="group">
        <h1 id="title" class="text-2xl font-bold mb-4 transition-all duration-500 transform group-hover:text-blue-500 transition-colors duration-300">Counter App</h1>

        <p id="counter" class=" p-10 border-2 border-blue-300 rounded-2xl text-5xl font-bold transition-all duration-300 transform">0</p>

        <!-- Buttons -->
         <div class="flex justify-around gap-6 pt-6">
            <button id="add" 
            class="bg-blue-500  transition-all duration-300  hover:ring-2 hover:ring-green-300 active:scale-110 text-white font-bold py-2 px-4 rounded-lg shadow ">+</button>

            <button id="subtract" 
            class="bg-blue-500 transition-all duration-300  hover:ring-2 hover:ring-pink-400 active:scale-110 text-white font-bold py-2 px-4 rounded-lg shadow">-</button>
         </div>
        
        <div class=" flex justify-center pt-5">
            <button id="reset" class=" px-5 py-2 bg-blue-500 hover:to-blue-500 hover:ring-2 hover:ring-blue-600 active:scale-110  text-white font-bold rounded-lg shadow ">Reset</button>
        </div>


         </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
